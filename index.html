<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Name | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #1e293b;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 80px;
        }

        nav h2 {
            font-weight: 600;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav ul li {
            cursor: pointer;
            font-weight: 500;
            color: #475569;
        }

        nav ul li:hover {
            color: #0f172a;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            padding: 100px 80px;
        }

        .avatar {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .hero-text small {
            color: #3b82f6;
            letter-spacing: 1px;
        }

        .hero-text h1 {
            font-size: 60px;
            margin: 15px 0;
        }

        .hero-text p {
            font-size: 20px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .socials {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .socials a {
            text-decoration: none;
            font-size: 20px;
            color: #475569;
        }

        .socials a:hover {
            color: #0f172a;
        }

        .btn {
            padding: 14px 30px;
            background-color: #0f172a;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #1e293b;
        }

        @media(max-width: 900px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            nav {
                padding: 20px 30px;
            }

            .hero {
                padding: 60px 30px;
            }

            .hero-text h1 {
                font-size: 40px;
            }

            .avatar {
                width: 200px;
                height: 200px;
                font-size: 50px;
            }
        }
    </style>
</head>
<body>

<nav>
    <h2>Your Name</h2>
    <ul>
        <li>About</li>
        <li>Skills</li>
        <li>Projects</li>
        <li>Education</li>
        <li>Contact</li>
    </ul>
</nav>

<section class="hero">
    <div class="avatar">
        YN
    </div>

    <div class="hero-text">
        <small>WELCOME TO MY PORTFOLIO</small>
        <h1>Your Name</h1>
        <p>Final-Year IT Student • Aspiring Software Developer</p>

        <div class="socials">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Email</a>
        </div>

        <a href="CV.pdf" download>
            <button class="btn">Download CV</button>
        </a>
    </div>
</section>

</body>
</html>
